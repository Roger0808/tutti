name: Publish Tutti App Release

on:
  workflow_call:
    inputs:
      app_id:
        required: true
        type: string
      package_command:
        required: true
        type: string
      package_dir:
        required: true
        type: string
      icon_path:
        required: false
        type: string
        default: ""
      release_version:
        required: false
        type: string
        default: ""
      runner:
        required: false
        type: string
        default: ubuntu-latest
      node_version:
        required: false
        type: string
        default: "24"
      pnpm_version:
        required: false
        type: string
        default: "10.11.0"
      release_tools_package:
        required: false
        type: string
        default: "@tutti-os/app-release-tools@latest"
      aws_region:
        required: true
        type: string
      aws_role_arn:
        required: true
        type: string
      s3_bucket:
        required: true
        type: string
      s3_prefix:
        required: false
        type: string
        default: ""
      release_assets_base_url:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Install app dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app package
        run: ${{ inputs.package_command }}

      - name: Resolve release version
        id: release
        shell: bash
        env:
          INPUT_RELEASE_VERSION: ${{ inputs.release_version }}
          PACKAGE_DIR: ${{ inputs.package_dir }}
        run: |
          if [ -n "${INPUT_RELEASE_VERSION}" ]; then
            release_version="${INPUT_RELEASE_VERSION}"
          else
            manifest_version="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).version)" "${PACKAGE_DIR}/nextop.app.json")"
            release_version="${manifest_version}+${GITHUB_SHA:0:12}"
          fi
          echo "version=${release_version}" >> "$GITHUB_OUTPUT"

      - name: Build release metadata
        shell: bash
        env:
          APP_ID: ${{ inputs.app_id }}
          PACKAGE_DIR: ${{ inputs.package_dir }}
          ICON_PATH: ${{ inputs.icon_path }}
          RELEASE_TOOLS_PACKAGE: ${{ inputs.release_tools_package }}
          RELEASE_ASSETS_BASE_URL: ${{ inputs.release_assets_base_url }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          args=(
            --app-id "${APP_ID}"
            --package-dir "${PACKAGE_DIR}"
            --output-dir nextop-app-release
            --base-url "${RELEASE_ASSETS_BASE_URL}"
            --version "${RELEASE_VERSION}"
            --git-sha "${GITHUB_SHA}"
          )
          if [ -n "${ICON_PATH}" ]; then
            args+=(--icon-path "${ICON_PATH}")
          fi
          pnpm --package "${RELEASE_TOOLS_PACKAGE}" dlx build-nextop-app-release "${args[@]}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_role_arn }}

      - name: Upload app release to S3
        shell: bash
        env:
          APP_ID: ${{ inputs.app_id }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          S3_BUCKET: ${{ inputs.s3_bucket }}
          S3_PREFIX: ${{ inputs.s3_prefix }}
        run: |
          prefix="${S3_PREFIX%/}"
          if [ -n "${prefix}" ]; then
            s3_root="s3://${S3_BUCKET}/${prefix}"
          else
            s3_root="s3://${S3_BUCKET}"
          fi

          aws s3 sync "nextop-app-release/apps/${APP_ID}/${RELEASE_VERSION}/" "${s3_root}/apps/${APP_ID}/${RELEASE_VERSION}/" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp "nextop-app-release/apps/${APP_ID}/latest.json" "${s3_root}/apps/${APP_ID}/latest.json" \
            --content-type "application/json" \
            --cache-control "public, max-age=60"

      - name: Verify published app release artifact
        shell: bash
        env:
          APP_ID: ${{ inputs.app_id }}
          RELEASE_TOOLS_PACKAGE: ${{ inputs.release_tools_package }}
        run: |
          pnpm --package "${RELEASE_TOOLS_PACKAGE}" dlx verify-nextop-app-release-artifacts \
            --release-file "nextop-app-release/apps/${APP_ID}/latest.json"
